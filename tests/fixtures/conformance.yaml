# OATF conformance document — non-adversarial MCP server for protocol testing.
# No phases, no behaviors, no side effects — pure benign MCP server.
oatf: "0.1"
attack:
  name: conformance
  execution:
    mode: mcp_server
    state:
      capabilities:
        tools: {}
        resources: {}
        prompts: {}

      tools:
        - name: "echo"
          description: "Echoes input back to the caller"
          inputSchema:
            type: object
            properties:
              message:
                type: string
                description: "Message to echo"
            required: ["message"]
          responses:
            - content:
                - type: text
                  text: "Echo: hello"

        - name: "add"
          description: "Adds two numbers"
          inputSchema:
            type: object
            properties:
              a:
                type: number
              b:
                type: number
            required: ["a", "b"]
          responses:
            - content:
                - type: text
                  text: "42"

        - name: "test_simple_text"
          description: "Returns simple text for testing"
          inputSchema:
            type: object
            properties: {}
          responses:
            - content:
                - type: text
                  text: "This is a simple text response for testing."

        - name: "test_error_handling"
          description: "Returns an error for testing"
          inputSchema:
            type: object
            properties: {}
          responses:
            - isError: true
              content:
                - type: text
                  text: "This tool intentionally returns an error for testing"

      resources:
        - uri: "file:///docs/readme"
          name: "README"
          description: "Project documentation"
          mimeType: "text/plain"
          responses:
            - contents:
                - uri: "file:///docs/readme"
                  text: "ThoughtJack conformance test resource."

        - uri: "test://static-text"
          name: "static-text"
          description: "Static text resource for conformance testing"
          mimeType: "text/plain"
          responses:
            - contents:
                - uri: "test://static-text"
                  text: "This is the content of the static text resource."

      prompts:
        - name: "greet"
          description: "Generates a greeting"
          arguments:
            - name: "name"
              description: "Name to greet"
              required: true
          responses:
            - messages:
                - role: assistant
                  content:
                    type: text
                    text: "Hello! How can I help you today?"

        - name: "test_simple_prompt"
          description: "Simple prompt for conformance testing"
          responses:
            - messages:
                - role: user
                  content:
                    type: text
                    text: "This is a simple prompt for testing."
